services:
  app:
    build: .
    ports:
      - "8081:8080"
    networks:
      - s-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/SpringDocker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Suyochi@123
    volumes:
      - mysql-data:/var/lib/mysql/data
  mysql:
    image: mysql:latest
    ports:
      - "3307:3306"
    networks:
      - s-network
    environment:
      MYSQL_ROOT_PASSWORD: Suyochi@123
      MYSQL_DATABASE: SpringDocker
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSuyochi@123"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  s-network:
    driver: bridge

volumes:
  mysql-data:
